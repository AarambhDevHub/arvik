<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arvik Chat — Multi-Room WebSocket</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161a22;
      --surface2:  #1e2330;
      --border:    #2a3040;
      --accent:    #6366f1;
      --accent-h:  #818cf8;
      --success:   #22c55e;
      --warn:      #f59e0b;
      --danger:    #ef4444;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    12px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Layout ── */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-h));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sidebar-header p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.disconnected { background: var(--danger); }

    .sidebar-section {
      padding: 12px 16px 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .room-list { flex: 1; overflow-y: auto; padding: 4px 8px; }

    .room-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--muted);
      transition: all 0.15s;
      user-select: none;
    }

    .room-item:hover { background: var(--surface2); color: var(--text); }
    .room-item.active {
      background: linear-gradient(135deg, #6366f120, #818cf810);
      color: var(--accent-h);
      font-weight: 600;
      border: 1px solid #6366f130;
    }

    .room-item .room-icon { font-size: 15px; }

    .room-add {
      padding: 8px;
      border-top: 1px solid var(--border);
    }

    .room-add-form {
      display: flex;
      gap: 6px;
    }

    .room-add-form input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border 0.2s;
    }

    .room-add-form input:focus { border-color: var(--accent); }

    .room-add-form button {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 7px 11px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .room-add-form button:hover { background: var(--accent-h); }
    .room-add-form button:active { transform: scale(0.95); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }

    .chat-header h2 { font-size: 16px; font-weight: 600; }

    .chat-header .member-count {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface2);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 72%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .msg.self { align-self: flex-end; }
    .msg.other { align-self: flex-start; }
    .msg.system { align-self: center; }

    .msg-meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 3px;
      padding: 0 4px;
    }

    .msg.self .msg-meta { text-align: right; }

    .msg-bubble {
      padding: 9px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg.self .msg-bubble {
      background: linear-gradient(135deg, var(--accent), var(--accent-h));
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.other .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg.system .msg-bubble {
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--muted);
      font-size: 12px;
      border-radius: 20px;
      padding: 4px 14px;
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-row input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border 0.2s;
      font-family: inherit;
    }

    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: var(--muted); }

    .send-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-h));
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      font-family: inherit;
    }

    .send-btn:hover { opacity: 0.9; }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Username modal ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: #00000090;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 360px;
      box-shadow: 0 24px 64px #00000060;
      animation: fadeIn 0.3s ease;
    }

    .modal h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent-h));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

    .modal input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      margin-bottom: 14px;
      font-family: inherit;
      transition: border 0.2s;
    }

    .modal input:focus { border-color: var(--accent); }

    .modal button {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent-h));
      border: none;
      border-radius: 8px;
      padding: 11px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }

    .modal button:hover { opacity: 0.9; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- Username modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h2>⚡ Arvik Chat</h2>
    <p>Choose a username to get started.</p>
    <input id="usernameInput" type="text" maxlength="20"
           placeholder="Your name..." autocomplete="off" />
    <button id="joinBtn">Join Chat →</button>
  </div>
</div>

<!-- App -->
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>⚡ Arvik Chat</h1>
      <p>
        <span class="status-dot disconnected" id="statusDot"></span>
        <span id="statusText">Disconnected</span>
      </p>
    </div>
    <div class="sidebar-section">Rooms</div>
    <div class="room-list" id="roomList"></div>
    <div class="room-add">
      <div class="room-add-form">
        <input id="newRoomInput" type="text" maxlength="32"
               placeholder="room-name" autocomplete="off" />
        <button id="newRoomBtn" title="Join room">+</button>
      </div>
    </div>
  </aside>

  <!-- Main chat -->
  <main class="main">
    <div class="chat-header">
      <span style="font-size:18px">💬</span>
      <h2 id="chatRoomLabel"># general</h2>
      <span class="member-count" id="memberCount">ws</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <div class="input-row">
        <input id="msgInput" type="text" placeholder="Message #general..."
               autocomplete="off" maxlength="500" />
        <button class="send-btn" id="sendBtn" disabled>Send</button>
      </div>
    </div>
  </main>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let ws = null;
  let username = '';
  let currentRoom = 'general';
  const ROOMS = ['general', 'rust', 'random'];

  // ── Elements ───────────────────────────────────────────────────────────────
  const modalBackdrop  = document.getElementById('modalBackdrop');
  const usernameInput  = document.getElementById('usernameInput');
  const joinBtn        = document.getElementById('joinBtn');
  const statusDot      = document.getElementById('statusDot');
  const statusText     = document.getElementById('statusText');
  const roomList       = document.getElementById('roomList');
  const chatRoomLabel  = document.getElementById('chatRoomLabel');
  const memberCount    = document.getElementById('memberCount');
  const messages       = document.getElementById('messages');
  const msgInput       = document.getElementById('msgInput');
  const sendBtn        = document.getElementById('sendBtn');
  const newRoomInput   = document.getElementById('newRoomInput');
  const newRoomBtn     = document.getElementById('newRoomBtn');

  // ── Username modal ─────────────────────────────────────────────────────────
  usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') doJoin(); });
  joinBtn.addEventListener('click', doJoin);

  function doJoin() {
    const name = usernameInput.value.trim();
    if (!name) return usernameInput.focus();
    username = name;
    modalBackdrop.style.display = 'none';
    buildRoomList();
    connectRoom('general');
  }

  // ── Room list ──────────────────────────────────────────────────────────────
  function buildRoomList() {
    roomList.innerHTML = '';
    ROOMS.forEach(r => addRoomItem(r));
  }

  function addRoomItem(room) {
    if (document.getElementById('room-' + room)) return;
    const el = document.createElement('div');
    el.className = 'room-item' + (room === currentRoom ? ' active' : '');
    el.id = 'room-' + room;
    el.innerHTML = `<span class="room-icon">#</span>${room}`;
    el.addEventListener('click', () => connectRoom(room));
    roomList.appendChild(el);
  }

  newRoomBtn.addEventListener('click', joinNewRoom);
  newRoomInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinNewRoom(); });

  function joinNewRoom() {
    const room = newRoomInput.value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '').slice(0, 32);
    if (!room) return;
    newRoomInput.value = '';
    if (!ROOMS.includes(room)) ROOMS.push(room);
    addRoomItem(room);
    connectRoom(room);
  }

  // ── Room sync ──────────────────────────────────────────────────────────────
  async function fetchRooms() {
    try {
      const res = await fetch('/rooms');
      if (!res.ok) return;
      const serverRooms = await res.json();
      serverRooms.forEach(r => {
        if (!ROOMS.includes(r)) {
          ROOMS.push(r);
          addRoomItem(r);
        }
      });
    } catch (_) {}
  }

  // Poll every 5 seconds to pick up rooms created by other clients
  setInterval(fetchRooms, 5000);

  // ── WebSocket ──────────────────────────────────────────────────────────────
  function connectRoom(room) {
    if (ws) { ws.onclose = null; ws.close(); }

    // Update UI
    document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
    const ri = document.getElementById('room-' + room);
    if (ri) ri.classList.add('active');
    currentRoom = room;
    chatRoomLabel.textContent = '# ' + room;
    msgInput.placeholder = `Message #${room}...`;
    messages.innerHTML = '';
    setStatus(false);
    sendBtn.disabled = true;

    const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
    const name = encodeURIComponent(username);
    const url = room === 'general'
      ? `${protocol}://${location.host}/ws?name=${name}`
      : `${protocol}://${location.host}/ws/room/${room}?name=${name}`;

    ws = new WebSocket(url, ['chat']);

    ws.onopen = () => {
      setStatus(true);
      sendBtn.disabled = false;
      memberCount.textContent = 'connected';
      // Sync room list from server
      fetchRooms();
    };

    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.system) {
          appendSystem(data.msg);
        } else {
          const isSelf = data.from === username;
          appendMessage(data.from, data.msg, isSelf);
        }
      } catch {
        appendSystem(e.data);
      }
    };

    ws.onclose = () => {
      setStatus(false);
      sendBtn.disabled = true;
      memberCount.textContent = 'disconnected';
      appendSystem('Connection closed. Reconnecting in 3s…');
      setTimeout(() => connectRoom(room), 3000);
    };

    ws.onerror = () => {
      appendSystem('WebSocket error.');
    };
  }

  // ── Send ───────────────────────────────────────────────────────────────────
  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    // Send raw text — server broadcasts back to everyone including us.
    // isSelf is detected when data.from === username.
    ws.send(text);
    msgInput.value = '';
  }

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Render ─────────────────────────────────────────────────────────────────
  function appendMessage(from, text, isSelf) {
    const div = document.createElement('div');
    div.className = 'msg ' + (isSelf ? 'self' : 'other');
    div.innerHTML = `
      <div class="msg-meta">${isSelf ? 'You' : escHtml(from)} · ${time()}</div>
      <div class="msg-bubble">${escHtml(text)}</div>
    `;
    messages.appendChild(div);
    scrollBottom();
  }

  function appendSystem(text) {
    const div = document.createElement('div');
    div.className = 'msg system';
    div.innerHTML = `<div class="msg-bubble">⚡ ${escHtml(text)}</div>`;
    messages.appendChild(div);
    scrollBottom();
  }

  function scrollBottom() {
    messages.scrollTop = messages.scrollHeight;
  }

  function setStatus(connected) {
    statusDot.className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
    statusText.textContent = connected ? 'Connected' : 'Disconnected';
  }

  function time() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Focus username input on load
  usernameInput.focus();
</script>
</body>
</html>
